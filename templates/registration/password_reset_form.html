{% extends 'base.html' %}

{% block title %}Recuperar contraseña{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-shell">
        <div class="page-card">
            <h2 class="section-title mb-3">Recuperar contraseña</h2>
            <p class="section-subtitle mb-4">Ingresa tu correo para enviarte instrucciones.</p>

            <form method="post">
                {% csrf_token %}
                <div class="field-group mb-3">
                    <label class="field-label">Correo electrónico</label>
                    {{ form.email }}
                </div>

                <div class="actions">
                    <button type="submit" class="btn-main btn-save">
                        Enviar correo
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
