{% extends 'base.html' %}

{% block title %}Nueva contraseña{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-shell">
        <div class="page-card">
            <h2 class="section-title mb-3">Nueva contraseña</h2>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="actions">
                    <button type="submit" class="btn-main btn-save">Guardar contraseña</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
