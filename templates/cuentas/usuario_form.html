{% extends 'base.html' %}
{% block content %}
<h2 class="section-title mb-4">{{ titulo }}</h2>

<div class="dashboard-card" style="max-width:800px;">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="d-flex gap-2 flex-wrap mt-3">
            <button class="btn btn-primary">Guardar</button>
            <a href="{% url 'usuarios_list' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
