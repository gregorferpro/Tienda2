{% extends 'base.html' %}

{% block title %}Usuarios{% endblock %}

{% block content %}
<div class="page-card">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h2 class="section-title mb-1">Usuarios</h2>
            <p class="section-subtitle mb-0">Administra las cuentas del sistema.</p>
        </div>
        <a href="{% url 'usuario_create' %}" class="btn btn-primary">
            + Nuevo usuario
        </a>
    </div>

    <form method="get" class="mb-4">
        <input
            type="text"
            name="q"
            id="usuarios-search"
            value="{{ q }}"
            placeholder="Buscar por nombre, usuario o email"
            class="form-control"
            autocomplete="off"
        >
    </form>

    <div id="usuarios-table-wrapper">
        {% include 'cuentas/partials/usuarios_table.html' %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
    const input = document.getElementById('usuarios-search');
    const wrapper = document.getElementById('usuarios-table-wrapper');
    let timer = null;

    if (!input || !wrapper) return;

    input.addEventListener('input', function () {
        clearTimeout(timer);

        timer = setTimeout(function () {
            const q = encodeURIComponent(input.value.trim());

            fetch(`?q=${q}`, {
                headers: {
                    'x-requested-with': 'XMLHttpRequest'
                }
            })
            .then(response => response.text())
            .then(html => {
                wrapper.innerHTML = html;
            });
        }, 250);
    });
})();
</script>
{% endblock %}
