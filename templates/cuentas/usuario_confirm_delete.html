{% extends 'base.html' %}
{% block content %}
<div class="dashboard-card" style="max-width:700px;">
    <h3>¿Eliminar usuario {{ usuario.username }}?</h3>

    <form method="post" class="mt-3">
        {% csrf_token %}
        <button class="btn btn-danger">Eliminar</button>
        <a href="{% url 'usuarios_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
