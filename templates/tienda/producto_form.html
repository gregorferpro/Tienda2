{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="page-header">
    <h2 class="section-title">{{ titulo }}</h2>
</div>

<div class="dashboard-card" style="max-width:900px;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="mb-3">
            <label class="form-label">Imágenes del producto</label>
            <input type="file" name="imagenes_extra" multiple class="form-control">
        </div>

        {% if producto and producto.imagenes_extra.all %}
            <h5 class="mt-4">Imágenes actuales</h5>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">
                {% for img in producto.imagenes_extra.all %}
                    <img src="{{ img.imagen.url }}" style="width:100px; height:100px; object-fit:cover; border-radius:10px;">
                {% endfor %}
            </div>
        {% endif %}

        <div class="d-flex gap-2 flex-wrap mt-3">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'productos_list' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
