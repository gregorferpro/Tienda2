{% extends 'base.html' %}

{% block title %}Clientes{% endblock %}

{% block content %}
<div class="page-card">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h2 class="section-title mb-1">Clientes</h2>
            <p class="section-subtitle mb-0">Administra la información de tus clientes.</p>
        </div>
        {% if user.is_superuser %}
        <a href="{% url 'cliente_create' %}" class="btn btn-primary">
            <i class="fa-solid fa-plus"></i> Nuevo cliente
        </a>
        {% endif %}
    </div>

    <form method="get" class="mb-4">
        <input
            type="text"
            name="q"
            id="clientes-search"
            value="{{ q }}"
            placeholder="Buscar por nombre, apellido, teléfono o CI/NIT"
            class="form-control"
            autocomplete="off"
        >
    </form>

    <div id="clientes-table-wrapper">
        {% include 'tienda/partials/clientes_table.html' %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
    const input = document.getElementById('clientes-search');
    const wrapper = document.getElementById('clientes-table-wrapper');
    let timer = null;

    if (!input || !wrapper) return;

    input.addEventListener('input', function () {
        clearTimeout(timer);

        timer = setTimeout(function () {
            const q = encodeURIComponent(input.value.trim());

            fetch(`?q=${q}`, {
                headers: {
                    'x-requested-with': 'XMLHttpRequest'
                }
            })
            .then(response => response.text())
            .then(html => {
                wrapper.innerHTML = html;
            });
        }, 250);
    });
})();
</script>
{% endblock %}
