{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h2 class="section-title">Listado de Clientes</h2>

    {% if user.is_superuser or user.perfil.rol == 'superuser' %}
    <a href="{% url 'cliente_create' %}" class="btn btn-primary btn-main">
        <i class="fa-solid fa-plus"></i> Nuevo cliente
    </a>
    {% endif %}
</div>

<div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input
        type="text"
        class="live-search"
        data-url="{% url 'clientes_list' %}"
        data-target="#clientes-table-wrap"
        name="q"
        placeholder="Buscar por nombres, apellidos, teléfono o CI/NIT"
        value="{{ q }}"
    >
</div>

<div id="clientes-table-wrap">
    {% include 'tienda/partials/clientes_table.html' %}
</div>
{% endblock %}
