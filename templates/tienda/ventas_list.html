{% extends 'base.html' %}

{% block title %}Ventas{% endblock %}

{% block content %}
<div class="page-card">
    <div class="mb-4">
        <h2 class="section-title mb-1">Ventas</h2>
        <p class="section-subtitle mb-0">Consulta el historial de ventas registradas.</p>
    </div>

    <form method="get" class="mb-4">
        <input
            type="text"
            name="q"
            id="ventas-search"
            value="{{ q }}"
            placeholder="Buscar por factura, cliente, usuario o método de pago"
            class="form-control"
            autocomplete="off"
        >
    </form>

    <div id="ventas-table-wrapper">
        {% include 'tienda/partials/ventas_table.html' %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
    const input = document.getElementById('ventas-search');
    const wrapper = document.getElementById('ventas-table-wrapper');
    let timer = null;

    if (!input || !wrapper) return;

    input.addEventListener('input', function () {
        clearTimeout(timer);

        timer = setTimeout(function () {
            const q = encodeURIComponent(input.value.trim());

            fetch(`?q=${q}`, {
                headers: {
                    'x-requested-with': 'XMLHttpRequest'
                }
            })
            .then(response => response.text())
            .then(html => {
                wrapper.innerHTML = html;
            });
        }, 250);
    });
})();
</script>
{% endblock %}
