{% extends 'base.html' %}

{% block title %}Eliminar cliente{% endblock %}

{% block content %}
<div class="delete-shell">
    <div class="delete-card text-center">
        <div class="delete-icon"><i class="fa-solid fa-user-minus"></i></div>
        <h2 class="section-title mb-3">Eliminar cliente</h2>
        <p class="section-subtitle mb-4">Se eliminará el cliente <strong>{{ object.nombres }} {{ object.apellidos }}</strong>. Confirma la acción.</p>

        <form method="post">
            {% csrf_token %}
            <div class="delete-actions justify-content-center">
                <button type="submit" class="btn btn-danger">
                    <i class="fa-solid fa-trash"></i> Eliminar
                </button>
                <a href="{% url 'clientes_list' %}" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
