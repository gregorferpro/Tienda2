{% extends 'base.html' %}

{% block title %}Eliminar cliente{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-shell">
        <div class="page-card">
            <h2 class="section-title mb-3">Eliminar cliente</h2>
            <p class="section-subtitle mb-4">
                ¿Estás seguro de eliminar a <strong>{{ cliente.nombres }} {{ cliente.apellidos }}</strong>?
            </p>

            <form method="post">
                {% csrf_token %}
                <div class="actions">
                    <button type="submit" class="btn-main btn-delete">
                        <i class="fa-solid fa-trash"></i> Eliminar
                    </button>
                    <a href="{% url 'clientes_list' %}" class="btn-main btn-cancel">
                        <i class="fa-solid fa-arrow-left"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
