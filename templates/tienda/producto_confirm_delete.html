{% extends 'base.html' %}

{% block title %}Eliminar producto{% endblock %}

{% block content %}
<div class="delete-shell">
    <div class="delete-card text-center">
        <div class="delete-icon"><i class="fa-solid fa-box-archive"></i></div>
        <h2 class="section-title mb-3">Eliminar producto</h2>
        <p class="section-subtitle mb-4">Se eliminará el producto <strong>{{ object.nombre }}</strong>. Esta acción no se puede deshacer.</p>

        <form method="post">
            {% csrf_token %}
            <div class="delete-actions justify-content-center">
                <button type="submit" class="btn btn-danger">
                    <i class="fa-solid fa-trash"></i> Eliminar
                </button>
                <a href="{% url 'productos_list' %}" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
