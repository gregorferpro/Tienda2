{% extends 'base.html' %}
{% block content %}
<div class="dashboard-card" style="max-width:700px;">
    <h3>Eliminar producto {{ producto.codigo }}?</h3>
    <p class="mt-2 text-muted">
        Si este producto solo tiene compras o movimientos internos, el sistema permitira eliminarlo. Si ya tiene ventas, reclamos o devoluciones, el borrado seguira bloqueado.
    </p>

    <form method="post" class="mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'productos_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
